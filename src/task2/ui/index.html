<!DOCTYPE html>
<html>
<head>
    <title>Candidate Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        .header {
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            color: white;
            padding: 20px 30px;

            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .container {
            padding: 20px;
        }

        .best-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .best-title {
            font-size: 18px;
            color: #888;
        }

        .best-name {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        .badge {
            display: inline-block;
            background: gold;
            color: black;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-left: 10px;
        }

        .reason {
            background: #f1f5ff;
            padding: 12px;
            border-left: 4px solid #4facfe;
            border-radius: 6px;
            color: #333;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .card {
            background: white;
            padding: 30px;
            margin: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        canvas {
            width: 100% !important;
            height: 350px !important;
        }

    </style>
</head>

<body>

<div class="header">
    AI Candidate Evaluation Dashboard
</div>

<div class="container">

    <div class="best-card">
        <div class="best-title">Summary</div>
        <div id="bestName" class="best-name"></div>
        <div id="bestReason" class="reason"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Total Score</h3>
            <canvas id="barChart"></canvas>
        </div>

        <div class="card">
            <h3>Candidates Breakdown</h3>
            <canvas id="radarChart"></canvas>
        </div>
    </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
